### uncomment for Manta m8p ###
#host MCU service is preinstalled and ready to use with:
#[mcu CB1]
#serial: /tmp/klipper_host_mcu

[mcu]
canbus_uuid: 060acfe09f45  ## octo-pro
#canbus_uuid: 4e7da242d0d8  ## manta-m8p
# serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_1D00240011504B4633373520-if00

[mcu EBBCan]
#canbus_uuid: 7dc74210e1ad   ### octopus  pro ###
canbus_uuid: 2f8f4f95e186   ### manta m8p ###

[temperature_sensor raspberry_pi4b]
sensor_type: temperature_host
min_temp: 10
max_temp: 100 

[temperature_sensor mcu_octopus-pro]
sensor_type: temperature_mcu
sensor_mcu: mcu
min_temp: 0
max_temp: 100

[temperature_sensor EBB36] #the EBB36 can be any name you want as long as it doesn’t match any other named device.
sensor_type: temperature_mcu
sensor_mcu: EBBCan 
min_temp: 0
max_temp: 100



[printer]
kinematics: corexy
max_velocity: 600
max_accel: 10000
max_z_velocity: 5
max_z_accel: 100


[gcode_arcs]
resolution: 0.1
#   An arc will be split into segments. Each segment's length will
#   equal the resolution in mm set above. Lower values will produce a
#   finer arc, but also more work for your machine. Arcs smaller than
#   the configured value will become straight lines. The default is
#   1mm.[exclude_object]


[virtual_sdcard]
path: ~/printer_data/gcodes
[display_status]
[pause_resume]


# This file contains common pin mappings for the BIGTREETECH Manta M8P
# To use this config, the firmware should be compiled for the
# STM32G0B1 with a "8KiB bootloader" "8 MHz crystal"
# and "USB (on PA11/PA12)" or "CAN bus (on PD12/PD13)".

# See docs/Config_Reference.md for a description of parameters.

### B Motor (gantry left) Motor0 octo-pro
### B Motor (gantry left) Motor1 manta-m8p
[stepper_x]
#step_pin: PE2 #manta-m8p
step_pin: PF13 #octo-pro
#dir_pin: PB4  #manta-m8p
dir_pin: PF12  #octo-pro
#enable_pin: !PC11  #manta-m8p
enable_pin: !PF14  #octo-pro
microsteps: 16
rotation_distance: 40
endstop_pin: ^EBBCan: PB8
position_endstop: 380
position_min: -10
position_max: 385
homing_speed: 150 #80
homing_retract_dist: 10
homing_positive_dir: true


### A Motor (gantry right) Motor1 octo-pro
### A Motor (gantry right) Motor2 manta-m8p
[stepper_y]
#step_pin: PF12  #manta-m8p
step_pin: PG0  #octo-pro
#dir_pin: !PF11  #manta-m8p
dir_pin: !PG1  #octo-pro
#enable_pin: !PB3 #manta-m8p
enable_pin: !PF15  #octo-pro
microsteps: 16
rotation_distance: 40
full_steps_per_rotation: 200
#endstop_pin: ^PF4  #manta-m8p
endstop_pin: ^PG9 #octo-prop
position_endstop: 385 #382
position_min: 0
position_max: 386 #382
homing_speed: 150 #80
homing_retract_dist: 5
homing_positive_dir: true


### Z Motor (Z) MOTOR 2_1 octo-pro
### Z Motor (Z) MOTOR 6 manta-m8p
[stepper_z]
#step_pin: PA10  #manta-m8p
step_pin: PF11  #octo-pro
#dir_pin: PA14  #manta-m8p
dir_pin: PG3  #octo-pro
#enable_pin: !PA15  #manta-m8p
enable_pin: !PG5  #octo-pro
microsteps: 128 #16 #32 #16
rotation_distance: 2 #8
position_min: -15.5
position_max: 400
#endstop_pin: ^PF5  #manta_m8p
endstop_pin: ^PG10  #octo-pro
##
##  After you run Z_ENDSTOP_CALIBRATE, position_endstop will be stored at the very end of your config
#position_endstop: 0
## All builds use same Max Z
homing_speed: 10.0 # Leadscrews are slower than 2.4, 10 is a recommended max.
second_homing_speed: 5
homing_retract_dist: 3


################################################
#### dir pin set reverse for creality mtrs #####
################################################

### Z Motor (Z_1) MOTOR 3 octo-pro
### Z Motor (Z_1) MOTOR 7 manta-m8p
[stepper_z1]
#step_pin: PD11  #manta-m8p
step_pin: PC13 #PG4  #octo-pro
#dir_pin: PD9  #manta-m8p
dir_pin: PF0 #PC1  #octo-pro
#enable_pin: !PD15  #manta-m8p
enable_pin: !PF1 #!PA0  #octo-pro
microsteps: 128 #16 #32 #16
rotation_distance: 2 #8
#...


### Z Motor (Z_2) MOTOR 4 octo-pro
