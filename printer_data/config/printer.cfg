[probe]
pin: EBBCan:PB6 # Set the Octopus jumper to 5v instead of the default 24v!
x_offset: 0
y_offset: 0
#z_offset: 5
speed: 2.5
samples: 3
samples_result: median
sample_retract_dist: 2.0
samples_tolerance: 0.01
samples_tolerance_retries: 5

# [safe_z_home]
# ##	XY Location of the Z Endstop Switch
# ##	Update -10,-10 to the XY coordinates of your endstop pin 
# ##	(such as 157,305) after going through Z Endstop Pin
# ##	Location Definition step.
# home_xy_position:165,374
# speed:100
# z_hop:20

[bed_mesh]
speed: 200 #120
horizontal_move_z: 15
mesh_min: 20, 24
mesh_max: 340, 310 # Ender 5 Plus
probe_count: 7,7
zero_reference_position: 175,177
mesh_pps: 2,2
fade_start: 1
fade_end: 10
algorithm: bicubic
bicubic_tension: 0.2



[z_tilt]
z_positions: 
  53,29  #10,7
  188,305  #188,355
  317,29  #360,7
  
#   A list of X, Y coordinates (one per line; subsequent lines
#   indented) describing the location of each bed "pivot point". The
#   "pivot point" is the point where the bed attaches to the given Z
#   stepper. It is described using nozzle coordinates (the X, Y position
#   of the nozzle if it could move directly above the point). The
#   first entry corresponds to stepper_z, the second to stepper_z1,
#   the third to stepper_z2, etc. This parameter must be provided.
points:
  53,29  #10,7
  188,305  #88,325
  317,29  #360,7

#   A list of X, Y coordinates (one per line; subsequent lines
#   indented) that should be probed during a Z_TILT_ADJUST command.
#   Specify coordinates of the nozzle and be sure the probe is above
#   the bed at the given nozzle coordinates. This parameter must be
#   provided.
speed: 200 #50
#   The speed (in mm/s) of non-probing moves during the calibration.
#   The default is 50.
horizontal_move_z: 35
#   The height (in mm) that the head should be commanded to move to
#   just prior to starting a probe operation. The default is 5.
retries: 20
#   Number of times to retry if the probed points aren't within
#   tolerance.
retry_tolerance: 0.025
#   If retries are enabled then retry if largest and smallest probed
#   points differ more than retry_tolerance. Note the smallest unit of
#   change here would be a single step. However if you are probing
#   more points than steppers then you will likely have a fixed
#   minimum value for the range of probed points which you can learn
#   by observing command output.

[neopixel TopL_LED]
pin: PB15 # Example pin for Port 1, check your M8P docs
chain_count: 18   # Number of LEDs in this strip
color_order: GRB   # Or RGB, RGBW, etc., check your strip
initial_RED: 0.4
initial_GREEN: 0.4
initial_BLUE: 0.4

[neopixel TopR_LED]
pin: PA9 # Example pin for Port 2 (e.g., a spare pin)
chain_count: 18    # Number of LEDs in this strip
color_order: GRB
initial_RED: 0.4
initial_GREEN: 0.4
initial_BLUE: 0.4

#[neopixel my_neopixel]
#pin: PA9
#   The pin connected to the neopixel. This parameter must be
#   provided.
#chain_count: 18
#   The number of Neopixel chips that are "daisy chained" to the
#   provided pin. The default is 1 (which indicates only a single
#   Neopixel is connected to the pin).
#color_order: GRB #   Set the pixel order required by the LED hardware. Options are GRB,
#   RGB, GRBW, or RGBW. The default is GRB.
#initial_RED: 0.8
#initial_GREEN: 0.8
#initial_BLUE: 0.8
#initial_WHITE: 0.0
#   Sets the initial LED color of the Neopixel. Each value should be
#   between 0.0 and 1.0. The WHITE option is only available on RGBW
#   LEDs. The default for each color is 0.

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE9, EXP1_2=PE10,
    EXP1_3=PE11, EXP1_4=PE12,
    EXP1_5=PE13, EXP1_6=PE14,    # Slot in the socket on this side
    EXP1_7=PE15, EXP1_8=PB10,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PB14, EXP2_2=PB13,
    EXP2_3=PF7, EXP2_4=PB12,
    EXP2_5=PE7, EXP2_6=PB11,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

