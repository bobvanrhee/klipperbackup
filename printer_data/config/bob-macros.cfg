#####################################################################
# Start Print and End Print
######################################################################

# Replace the slicer's custom start and end g-code scripts with
# START_PRINT and END_PRINT. See docs/Slicers.md for more information on using these macros.

[gcode_macro START_PRINT]
gcode:
    # Start bed heating ##
    #{% set BED_TEMP=params.BED_TEMP|default(60)|float %}
	#{% set EXTRUDER_TEMP=params.EXTRUDER_TEMP|default(190)|float %}
    M140 S55 #{BED_TEMP}
    #M190 S60    #{% set BED_TEMP = params.BED_TEMP|default(50)|float %}
    M109 S190  #{% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(215)|float %}
    
    
    # Use absolute coordinates
    G90
    # Reset the G-Code Z offset (adjust Z offset if needed)
    #SET_GCODE_OFFSET Z=0.0
    # Home the printer
    G28
    
	# Z probing sequence
	#G28
	#Z_TILT_ADJUST
	#G28
    calibrate_z
    BED_MESH_CLEAR
	BED_MESH_CALIBRATE PROFILE=adaptive ADAPTIVE=1
    
    ## Prime line sequence

    G92 E0 ; Reset Extruder
    G1 Z2.0 F3000 ; Move Z Axis up little to prevent scratching of Heat Bed
    G1 X5 Y20 Z0.3 F5000.0 ; Move to start position
    G1 X5 Y200.0 Z0.3 F1500.0 E15 ; Draw the first line
    G1 X5.4 Y200.0 Z0.3 F5000.0 ; Move to side a little
    G1 X5.4 Y20 Z0.3 F1500.0 E30 ; Draw the second line
    G92 E0 ; Reset Extruder
    
    # Wait for bed to reach temperature
    M190 S55 #{BED_TEMP}
   
    # Set and wait for nozzle to reach temperature
    M109 S215 #{EXTRUDER_TEMp



[gcode_macro END_PRINT]
gcode:
    # Turn off bed, extruder, and fan
    M140 S0
    M104 S0
    M106 S0
    # Move nozzle away from print while retracting
    G91
    G1 X-2 Y-3 E-3 F300
    # Raise nozzle by 10mm
    G1 Z200 F3000
    G90
    # Disable steppers
    M84




	
